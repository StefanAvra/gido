<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stadtführer — Voice City Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0e0e0b;
        --bg2: #161610;
        --bg3: #1e1e18;
        --amber: #c8943a;
        --amber-bright: #e8b050;
        --amber-dim: #6b4e1e;
        --amber-glow: rgba(200, 148, 58, 0.15);
        --green: #3d6b4a;
        --text: #d4ccba;
        --text-dim: #706a5c;
        --text-faint: #3a3830;
        --border: rgba(200, 148, 58, 0.12);
        --border-bright: rgba(200, 148, 58, 0.3);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Courier Prime", "Courier New", monospace;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(200, 148, 58, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(200, 148, 58, 0.025) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse at 15% 85%, rgba(200, 148, 58, 0.04) 0%, transparent 55%),
          radial-gradient(ellipse at 85% 15%, rgba(61, 107, 74, 0.04) 0%, transparent 55%);
        pointer-events: none;
        z-index: 0;
      }

      .wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 560px;
        padding: 2rem 1.5rem 3rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      /* ── Header ── */
      .header {
        width: 100%;
        text-align: center;
        padding-bottom: 1.5rem;
        border-bottom: 0.5px solid var(--border);
      }

      .header-eyebrow {
        font-size: 11px;
        letter-spacing: 0.3em;
        color: var(--amber);
        text-transform: uppercase;
        margin-bottom: 0.5rem;
        opacity: 0.7;
      }

      .header h1 {
        font-family: "Playfair Display", Georgia, serif;
        font-size: clamp(2rem, 8vw, 3rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--amber-bright);
        line-height: 1;
        margin-bottom: 0.4rem;
      }

      .header-sub {
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 0.12em;
        font-style: italic;
      }

      /* ── Config ── */
      .config {
        width: 100%;
        background: var(--bg2);
        border: 0.5px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }

      .config-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 1rem;
        cursor: pointer;
        user-select: none;
        font-size: 12px;
        color: var(--text-dim);
        letter-spacing: 0.1em;
      }

      .config-toggle:hover {
        color: var(--text);
      }

      .config-toggle-arrow {
        font-size: 10px;
        transition: transform 0.2s;
      }

      .config-toggle-arrow.open {
        transform: rotate(180deg);
      }

      .config-body {
        padding: 0 1rem 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .config-body.hidden {
        display: none;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .field label {
        font-size: 11px;
        letter-spacing: 0.15em;
        color: var(--text-dim);
        text-transform: uppercase;
      }

      .field input,
      .field select {
        background: var(--bg);
        border: 0.5px solid var(--border-bright);
        border-radius: 4px;
        padding: 0.5rem 0.75rem;
        color: var(--text);
        font-family: inherit;
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }

      .field input:focus,
      .field select:focus {
        border-color: var(--amber);
      }

      .field select option {
        background: var(--bg2);
      }

      /* ── Orb ── */
      .orb-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        padding: 1rem 0;
      }

      .orb-container {
        position: relative;
        width: 160px;
        height: 160px;
      }

      .orb-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 0.5px solid var(--border-bright);
        animation: ring-idle 4s ease-in-out infinite;
      }

      .orb-ring-2 {
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        border: 0.5px solid var(--border);
        animation: ring-idle 4s ease-in-out infinite reverse;
        animation-delay: -2s;
      }

      @keyframes ring-idle {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          transform: scale(1.02);
        }
      }

      @keyframes ring-pulse {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.06);
        }
      }

      @keyframes ring-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .orb {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: var(--bg2);
        border: 1px solid var(--amber-dim);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 6px;
        cursor: pointer;
        transition:
          border-color 0.3s,
          background 0.3s;
        user-select: none;
      }

      .orb:hover:not(:disabled) {
        border-color: var(--amber);
        background: var(--bg3);
      }

      .orb:active:not(:disabled) {
        transform: scale(0.97);
      }

      .orb.loading {
        cursor: not-allowed;
        pointer-events: none;
      }

      .orb.loading .orb-ring {
        animation: ring-pulse 1.2s ease-in-out infinite;
        border-color: var(--amber);
      }

      .orb.loading .orb-ring-2 {
        animation: ring-spin 3s linear infinite;
        border-color: var(--amber-dim);
        border-top-color: var(--amber);
      }

      .orb.speaking .orb-ring {
        animation: ring-pulse 0.6s ease-in-out infinite;
        border-color: var(--amber-bright);
      }

      .orb-icon {
        font-size: 28px;
        line-height: 1;
      }

      .orb-label {
        font-size: 10px;
        letter-spacing: 0.2em;
        color: var(--amber);
        text-transform: uppercase;
      }

      /* ── Status ── */
      .status-line {
        font-size: 13px;
        color: var(--text-dim);
        letter-spacing: 0.08em;
        min-height: 18px;
        text-align: center;
        font-style: italic;
        transition: color 0.3s;
      }

      .status-line.active {
        color: var(--amber);
      }

      /* ── Radius ── */
      .radius-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.1em;
      }

      .radius-row input[type="range"] {
        width: 120px;
        accent-color: var(--amber);
      }

      /* ── Waveform ── */
      .waveform {
        display: flex;
        align-items: center;
        gap: 3px;
        height: 40px;
        opacity: 0;
        transition: opacity 0.4s;
      }

      .waveform.active {
        opacity: 1;
      }

      .waveform-bar {
        width: 3px;
        background: var(--amber);
        border-radius: 2px;
        height: 4px;
        transition: height 0.05s;
      }

      /* ── Script display ── */
      .script-box {
        width: 100%;
        background: var(--bg2);
        border: 0.5px solid var(--border);
        border-radius: 8px;
        padding: 1rem 1.25rem;
        font-family: "Playfair Display", Georgia, serif;
        font-style: italic;
        font-size: 15px;
        line-height: 1.7;
        color: var(--text);
        display: none;
        position: relative;
      }

      .script-box::before {
        content: '"';
        position: absolute;
        top: -8px;
        left: 12px;
        font-size: 48px;
        color: var(--amber-dim);
        font-family: "Playfair Display", Georgia, serif;
        line-height: 1;
      }

      /* ── Landmarks ── */
      .landmarks-section {
        width: 100%;
      }

      .landmarks-label {
        font-size: 10px;
        letter-spacing: 0.2em;
        color: var(--text-faint);
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }

      .landmarks-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .landmark-pill {
        font-size: 11px;
        padding: 4px 10px;
        background: var(--bg3);
        border: 0.5px solid var(--border);
        border-radius: 20px;
        color: var(--text-dim);
        letter-spacing: 0.04em;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .landmark-pill-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--amber-dim);
        flex-shrink: 0;
      }

      /* ── Error ── */
      .error-box {
        width: 100%;
        background: rgba(180, 60, 40, 0.1);
        border: 0.5px solid rgba(180, 60, 40, 0.3);
        border-radius: 6px;
        padding: 0.75rem 1rem;
        font-size: 12px;
        color: #e07060;
        display: none;
        line-height: 1.5;
      }

      /* ── Footer ── */
      .footer {
        font-size: 10px;
        color: var(--text-faint);
        letter-spacing: 0.1em;
        text-align: center;
        padding-top: 1rem;
        border-top: 0.5px solid var(--text-faint);
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <!-- Header -->
      <div class="header">
        <div class="header-eyebrow">◈ voice city guide ◈</div>
        <h1>Stadtführer</h1>
        <div class="header-sub">discover what surrounds you</div>
      </div>

      <!-- Config -->
      <div class="config">
        <div class="config-toggle" id="configToggle" onclick="toggleConfig()">
          <span>⚙ settings</span>
          <span class="config-toggle-arrow open" id="configArrow">▲</span>
        </div>
        <div class="config-body" id="configBody">
          <div class="field">
            <label>ElevenLabs API Key</label>
            <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" />
          </div>
          <div class="field">
            <label>Voice</label>
            <select id="voiceSelect">
              <option value="21m00Tcm4TlvDq8ikWAM">Rachel — calm, professional</option>
              <option value="EXAVITQu4vr4xnSDxMaL">Bella — warm, soft</option>
              <option value="ErXwobaYiN019PkySvjV">Antoni — well-rounded</option>
              <option value="TxGEqnHWrfWFTfGW9XjX">Josh — deep, steady</option>
              <option value="pNInz6obpgDQGcFmaJgB">Adam — authoritative</option>
              <option value="yoZ06aMxZJJ28mfd3POQ">Sam — energetic</option>
            </select>
          </div>
          <div class="field">
            <label>Model</label>
            <select id="modelSelect">
              <option value="eleven_turbo_v2">Turbo v2 — fast</option>
              <option value="eleven_multilingual_v2">Multilingual v2 — all languages</option>
              <option value="eleven_monolingual_v1">Monolingual v1 — classic</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Orb -->
      <div class="orb-section">
        <div class="orb-container">
          <div class="orb-ring-2"></div>
          <div class="orb-ring"></div>
          <div class="orb" id="orb" onclick="handleExplore()">
            <div class="orb-icon" id="orbIcon">◎</div>
            <div class="orb-label" id="orbLabel">explore</div>
          </div>
        </div>

        <div class="radius-row">
          <span>radius</span>
          <input type="range" id="radiusSlider" min="200" max="2000" step="100" value="500" />
          <span id="radiusLabel">500 m</span>
        </div>

        <div class="status-line" id="statusLine">tap the orb to begin</div>
      </div>

      <!-- Waveform -->
      <div class="waveform" id="waveform">
        <!-- bars injected by JS -->
      </div>

      <!-- Script -->
      <div class="script-box" id="scriptBox"></div>

      <!-- Landmarks -->
      <div class="landmarks-section" id="landmarksSection" style="display: none">
        <div class="landmarks-label">nearby landmarks found</div>
        <div class="landmarks-grid" id="landmarksGrid"></div>
      </div>

      <!-- Error -->
      <div class="error-box" id="errorBox"></div>

      <!-- Footer -->
      <div class="footer">OSM · ElevenLabs · Claude · Stadtführer v0.1</div>
    </div>

    <script>
      // ── Config ──────────────────────────────────────────────────────────────────

      function toggleConfig() {
        const body = document.getElementById("configBody");
        const arrow = document.getElementById("configArrow");
        const open = !body.classList.contains("hidden");
        body.classList.toggle("hidden", open);
        arrow.classList.toggle("open", !open);
        arrow.textContent = open ? "▼" : "▲";
      }

      document.getElementById("radiusSlider").addEventListener("input", (e) => {
        document.getElementById("radiusLabel").textContent = e.target.value + " m";
      });

      // ── Waveform ─────────────────────────────────────────────────────────────────

      const BAR_COUNT = 20;
      const waveformEl = document.getElementById("waveform");
      const bars = [];

      for (let i = 0; i < BAR_COUNT; i++) {
        const b = document.createElement("div");
        b.className = "waveform-bar";
        waveformEl.appendChild(b);
        bars.push(b);
      }

      let analyser = null;
      let waveAnimId = null;

      function startWaveform(audio) {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          analyser = ctx.createAnalyser();
          analyser.fftSize = 64;
          const src = ctx.createMediaElementSource(audio);
          src.connect(analyser);
          analyser.connect(ctx.destination);
          drawWave();
        } catch (e) {
          startFakeWave();
        }
      }

      function drawWave() {
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const step = Math.floor(data.length / BAR_COUNT);
        bars.forEach((b, i) => {
          const v = (data[i * step] || 0) / 255;
          b.style.height = Math.max(3, v * 36) + "px";
        });
        waveAnimId = requestAnimationFrame(drawWave);
      }

      function startFakeWave() {
        function tick() {
          bars.forEach((b) => {
            b.style.height = Math.max(3, Math.random() * 32 + 4) + "px";
          });
          waveAnimId = requestAnimationFrame(tick);
        }
        tick();
      }

      function stopWave() {
        if (waveAnimId) cancelAnimationFrame(waveAnimId);
        bars.forEach((b) => {
          b.style.height = "4px";
        });
        waveformEl.classList.remove("active");
        analyser = null;
        waveAnimId = null;
      }

      // ── State ────────────────────────────────────────────────────────────────────

      const orbEl = document.getElementById("orb");
      const orbIcon = document.getElementById("orbIcon");
      const orbLabel = document.getElementById("orbLabel");
      const statusLine = document.getElementById("statusLine");
      const errorBox = document.getElementById("errorBox");
      const scriptBox = document.getElementById("scriptBox");
      const landmarksSection = document.getElementById("landmarksSection");
      const landmarksGrid = document.getElementById("landmarksGrid");

      let busy = false;

      const STATES = {
        idle: { icon: "◎", label: "explore", status: "tap the orb to begin", loading: false },
        locating: { icon: "⊕", label: "locating", status: "finding your position…", loading: true },
        fetching: {
          icon: "◉",
          label: "searching",
          status: "querying nearby landmarks…",
          loading: true,
        },
        generating: { icon: "◈", label: "writing", status: "composing your guide…", loading: true },
        speaking: {
          icon: "◆",
          label: "speaking",
          status: "playing guide…",
          loading: true,
          speaking: true,
        },
        done: {
          icon: "◎",
          label: "explore again",
          status: "ready for another walk",
          loading: false,
        },
      };

      function setState(s) {
        const cfg = STATES[s] || STATES.idle;
        orbIcon.textContent = cfg.icon;
        orbLabel.textContent = cfg.label;
        statusLine.textContent = cfg.status;
        statusLine.classList.toggle("active", !!cfg.loading);
        orbEl.classList.toggle("loading", !!cfg.loading && !cfg.speaking);
        orbEl.classList.toggle("speaking", !!cfg.speaking);
        busy = !!cfg.loading;
        if (!cfg.loading) stopWave();
      }

      function showError(msg) {
        errorBox.textContent = "⚠ " + msg;
        errorBox.style.display = "block";
        setState("idle");
      }

      function clearError() {
        errorBox.style.display = "none";
      }

      // ── Geolocation ───────────────────────────────────────────────────────────────

      function getLocation() {
        return new Promise((resolve, reject) => {
          if (!navigator.geolocation) return reject("Geolocation not supported by this browser.");
          navigator.geolocation.getCurrentPosition(
            (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
            (err) => reject("Location access denied. Please allow location in your browser."),
            { timeout: 10000, maximumAge: 60000 },
          );
        });
      }

      // ── Overpass / OSM ───────────────────────────────────────────────────────────

      async function fetchLandmarks(lat, lon, radius) {
        const q = `
[out:json][timeout:20];
(
  node["tourism"~"attraction|museum|artwork|viewpoint|monument|gallery|information"](around:${radius},${lat},${lon});
  node["historic"](around:${radius},${lat},${lon});
  node["amenity"~"place_of_worship|theatre|cinema|library|arts_centre"](around:${radius},${lat},${lon});
  node["natural"~"peak|waterfall|beach|spring|tree"](around:${radius},${lat},${lon});
  node["leisure"~"park|garden|nature_reserve"](around:${radius},${lat},${lon});
  way["tourism"~"attraction|museum|viewpoint|monument|gallery"](around:${radius},${lat},${lon});
  way["historic"](around:${radius},${lat},${lon});
  way["amenity"~"theatre|cinema|arts_centre"](around:${radius},${lat},${lon});
  way["leisure"~"park|garden|nature_reserve"](around:${radius},${lat},${lon});
);
out body center qt 30;
  `.trim();

        const res = await fetch("https://overpass-api.de/api/interpreter", {
          method: "POST",
          body: q,
        });
        if (!res.ok) throw new Error("OpenStreetMap query failed (" + res.status + ")");
        const data = await res.json();

        const seen = new Set();
        return data.elements
          .filter((e) => e.tags && e.tags.name && !seen.has(e.tags.name) && seen.add(e.tags.name))
          .map((e) => ({
            name: e.tags.name,
            type:
              e.tags.tourism ||
              e.tags.historic ||
              e.tags.amenity ||
              e.tags.natural ||
              e.tags.leisure ||
              "landmark",
            description: e.tags["description"] || e.tags["inscription"] || null,
            lat: e.lat || e.center?.lat,
            lon: e.lon || e.center?.lon,
          }))
          .slice(0, 12);
      }

      // ── Claude API ────────────────────────────────────────────────────────────────

      async function generateScript(landmarks, lat, lon) {
        const landmarkList = landmarks.map((l) => `• ${l.name} (${l.type})`).join("\n");
        const prompt = `You are a charming, knowledgeable city guide narrating a walk. Here are the landmarks within walking distance of the user's current location:

${landmarkList}

Write a short spoken introduction (around 120–160 words) that a friendly guide would say out loud. Highlight 2–4 of the most interesting landmarks. Be warm, informative, and conversational — as if speaking to someone who just arrived and wants to explore. No markdown, no lists, no special characters. Just natural spoken prose.`;

        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{ role: "user", content: prompt }],
          }),
        });
        if (!res.ok) throw new Error("Claude API error (" + res.status + ")");
        const data = await res.json();
        return data.content.find((b) => b.type === "text")?.text || "No guide generated.";
      }

      // ── ElevenLabs ────────────────────────────────────────────────────────────────

      async function synthesize(text, apiKey, voiceId, modelId) {
        const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
          method: "POST",
          headers: {
            "xi-api-key": apiKey,
            "Content-Type": "application/json",
            Accept: "audio/mpeg",
          },
          body: JSON.stringify({
            text,
            model_id: modelId,
            voice_settings: { stability: 0.45, similarity_boost: 0.78 },
          }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error("ElevenLabs error: " + (err?.detail?.message || res.status));
        }
        return await res.blob();
      }

      function playAudio(blob) {
        return new Promise((resolve) => {
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          audio.oncanplay = () => {
            waveformEl.classList.add("active");
            startWaveform(audio);
          };
          audio.onended = () => {
            URL.revokeObjectURL(url);
            stopWave();
            resolve();
          };
          audio.onerror = resolve;
          audio.play();
        });
      }

      // ── Main flow ─────────────────────────────────────────────────────────────────

      async function handleExplore() {
        if (busy) return;

        const apiKey = document.getElementById("apiKey").value.trim();
        if (!apiKey) {
          showError("Please enter your ElevenLabs API key in settings.");
          return;
        }

        const voiceId = document.getElementById("voiceSelect").value;
        const modelId = document.getElementById("modelSelect").value;
        const radius = parseInt(document.getElementById("radiusSlider").value);

        clearError();
        scriptBox.style.display = "none";
        landmarksSection.style.display = "none";
        landmarksGrid.innerHTML = "";

        try {
          setState("locating");
          const { lat, lon } = await getLocation();

          setState("fetching");
          const landmarks = await fetchLandmarks(lat, lon, radius);

          if (landmarks.length === 0) {
            setState("idle");
            showError(
              "No named landmarks found within " +
                radius +
                "m. Try increasing the radius or exploring a different area.",
            );
            return;
          }

          // Show landmark pills
          landmarksSection.style.display = "block";
          landmarks.forEach((l) => {
            const pill = document.createElement("div");
            pill.className = "landmark-pill";
            pill.innerHTML = `<span class="landmark-pill-dot"></span>${l.name}`;
            landmarksGrid.appendChild(pill);
          });

          setState("generating");
          const script = await generateScript(landmarks, lat, lon);

          // Show script
          scriptBox.textContent = script;
          scriptBox.style.display = "block";

          setState("speaking");
          const blob = await synthesize(script, apiKey, voiceId, modelId);
          await playAudio(blob);

          setState("done");
        } catch (err) {
          console.error(err);
          showError(err.message || "Something went wrong. Check the console for details.");
        }
      }
    </script>
  </body>
</html>
